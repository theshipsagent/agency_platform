services:
  postgres:
    image: postgres:16-alpine
    container_name: shipops_db
    environment:
      POSTGRES_USER: shipops
      POSTGRES_PASSWORD: shipops
      POSTGRES_DB: shipops
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
