name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck / lint / build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @shipops/db db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Tenant isolation guard
        # Fails the build if:
        #  1. The literal 'tenant-gca-001' appears in apps/ outside auth.ts
        #     (regression of the S1 migration — every hardcoded tenant is a
        #      potential cross-tenant leak)
        #  2. unscopedQuery / unscopedQueryOne is imported from app code
        #     (unscoped variants are reserved for seed scripts and migrations)
        # No untrusted input — script only greps committed files.
        run: bash scripts/ci-tenant-isolation-guard.sh

      - name: Audit trail guard
        # Fails the build if any file under apps/web/app/api/ contains a raw
        # mutation verb (INSERT INTO / UPDATE / DELETE FROM in a SQL template
        # literal) but does NOT import auditedMutation. S2 requires every
        # tenant-scoped write to flow through auditedMutation() so an
        # audit_logs row is written atomically with the mutation.
        # No untrusted input — script only greps committed files.
        run: bash scripts/ci-audit-trail-guard.sh

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder-for-ci-build
          CLERK_SECRET_KEY: sk_test_placeholder-for-ci-build
          DATABASE_URL: postgresql://user:pass@localhost:5432/placeholder
